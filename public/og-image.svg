<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0e12" />
      <stop offset="100%" stop-color="#1a1d24" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="subtle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(37,99,235,0.08)" />
      <stop offset="100%" stop-color="rgba(29,78,216,0.04)" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle decorative elements -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#subtle)" />
  <circle cx="1100" cy="80" r="320" fill="rgba(37,99,235,0.03)" />
  <circle cx="-50" cy="500" r="280" fill="rgba(37,99,235,0.02)" />

  <!-- Brand mark -->
  <rect x="80" y="200" width="72" height="72" rx="18" fill="url(#accent)" />
  <text x="116" y="248" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="1">LF</text>

  <!-- Brand name -->
  <text x="180" y="248" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-0.5">LeadFlow</text>

  <!-- Tagline -->
  <text x="80" y="320" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="26" font-weight="500" fill="#94a3b8" letter-spacing="0.3">Open-Source CRM</text>

  <!-- Value proposition -->
  <text x="80" y="360" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="18" fill="#64748b" letter-spacing="0.2">Pipeline management, project tracking, invoicing, time tracking,</text>
  <text x="80" y="390" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="18" fill="#64748b" letter-spacing="0.2">team messaging, and a client portal in one platform.</text>

  <!-- Infrastructure note -->
  <text x="80" y="435" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="15" fill="#475569" letter-spacing="0.2">Runs on free tiers. No per-seat pricing. MIT License.</text>

  <!-- CTA button -->
  <rect x="80" y="470" width="200" height="48" rx="8" fill="url(#accent)" />
  <text x="180" y="500" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="17" font-weight="600" fill="#ffffff">Try Demo — No Signup</text>

  <!-- Feature badges -->
  <rect x="320" y="470" width="130" height="48" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <text x="385" y="500" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="13" font-weight="500" fill="#94a3b8">Self-Hosted</text>

  <rect x="465" y="470" width="130" height="48" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <text x="530" y="500" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="13" font-weight="500" fill="#94a3b8">MIT License</text>

  <rect x="610" y="470" width="150" height="48" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <text x="685" y="500" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="13" font-weight="500" fill="#94a3b8">Node.js + Firebase</text>

  <!-- Divider -->
  <rect x="80" y="555" width="1040" height="1" fill="rgba(255,255,255,0.06)" />

  <!-- URL -->
  <text x="80" y="585" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="14" fill="#475569">crm.tabishbinishfaq.dev</text>

  <!-- CTA text -->
  <text x="1120" y="585" text-anchor="end" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="14" fill="#475569">Self-host on any Node.js server or deploy on Vercel</text>
</svg>
